<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-container">
    <section class="hero">
      <p class="eyebrow">Browser Game</p>
      <h1>Memory Match Game</h1>
      <p class="subtitle">Flip cards, find matching pairs, and try to clear the board in as few moves as possible.</p>
    </section>

    <section class="stats-panel" aria-label="Game statistics">
      <div class="stat-card">
        <span class="stat-label">Moves</span>
        <span id="move-count" class="stat-value">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Matches</span>
        <span id="match-count" class="stat-value">0 / 8</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Time</span>
        <span id="timer" class="stat-value">00:00</span>
      </div>
    </section>

    <section id="status-message" class="status-message" aria-live="polite">
      Click any card to start the timer.
    </section>

    <section id="game-board" class="game-board" aria-label="Memory match game board"></section>

    <button id="restart-btn" class="restart-btn" type="button">Restart Game</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
